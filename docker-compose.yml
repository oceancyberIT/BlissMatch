version: "3.9"

services:
  db:
    image: postgres:16
    container_name: blissmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blissmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blissmatch_password}
      POSTGRES_DB: ${POSTGRES_DB:-blissmatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - blissmatch-net

  redis:
    image: redis:7
    container_name: blissmatch-redis
    restart: unless-stopped
    networks:
      - blissmatch-net

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blissmatch-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-blissmatch}:${POSTGRES_PASSWORD:-blissmatch_password}@db:5432/${POSTGRES_DB:-blissmatch}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - db
      - redis
    networks:
      - blissmatch-net

  web:
    platform: linux/amd64
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: blissmatch-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - blissmatch-net

networks:
  blissmatch-net:
    driver: bridge

volumes:
  postgres_data:

